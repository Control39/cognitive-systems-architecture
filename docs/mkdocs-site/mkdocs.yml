site_name: Portfolio System Architect
site_description: 'Архитектура когнитивных систем'
# Правильный URL для SourceCraft хостинга
site_url: https://leadarchitect-ai.sourcecraft.site/portfolio-system-architect/
site_dir: site
docs_dir: docs

repo_url: https://git.sourcecraft.dev/leadarchitect-ai/portfolio-system-architect
repo_name: leadarchitect-ai/portfolio-system-architect
edit_uri: edit/main/docs/mkdocs-site/docs/

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Project Analysis: project-analysis.md
  - English: en/
  - Methodology: methodology/
  - ADR: 
    - adr/ADR-001-system-thinking-methodology.md
    - adr/ADR-002-component-integration.md
    - adr/ADR-003-diagram-format.md
  - Cases: cases/
  - Modules: modules/
  - Grants: grants/
  - Roadmap: roadmap.md

theme:
  name: material
  features:
    - content.code.copy
    - navigation.indexes
    - navigation.instant
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
  palette:
    - scheme: default
      primary: light blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: light blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    logo: material/arch

plugins:
  - search
  - git-revision-date-localized

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - toc:
      permalink: true
  - tables
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.arithmatex:
      generic: true

