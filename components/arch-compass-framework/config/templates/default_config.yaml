# Arch Compass Framework Default Configuration
# This is a template for the default configuration of the Arch Compass Framework

application:
  name: "ArchCompass"
  version: "1.0.0"
  environment: "development"

database:
  host: "localhost"
  port: 5432
  name: "archcompass"
  username: "archcompass_user"
  password: "archcompass_password"

logging:
  level: "info"
  file: "logs/archcompass.log"

security:
  encryptionKey: "default_encryption_key"
  jwtSecret: "default_jwt_secret"

features:
  enableAI: true
  enableMonitoring: true