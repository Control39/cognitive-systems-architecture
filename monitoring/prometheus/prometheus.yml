global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'cloud_reason'
    static_configs:
      - targets: ['cloud-reason:8000']

  - job_name: 'ml_model_registry'
    static_configs:
      - targets: ['ml-model-registry:8001']

  - job_name: 'it_compass'
    static_configs:
      - targets: ['it-compass:8501']
