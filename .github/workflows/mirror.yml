name: Mirror to GitHub

on:
  push:
    branches: [ main ]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GIT_MIRROR_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Mirror push
        run: |
          git remote add github git@github.com:Control39/cognitive-systems-architecture.git || git remote set-url github git@github.com:Control39/cognitive-systems-architecture.git || true
          git push github --mirror --force
