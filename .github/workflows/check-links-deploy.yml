name: Check Links + Deploy + Notify

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Check broken links
      uses: lycheeverse/lychee-action@v1
      with:
        args: --verbose --no-progress 05_DOCUMENTATION/mkdocs-site/docs/ README.md index.html

  deploy:
    needs: check-links
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install & Deploy MkDocs
      run: |
        pip install mkdocs-material mkdocs-mermaid2-plugin lychee
        cd 05_DOCUMENTATION/mkdocs-site
        mkdocs build --strict
        # Deploy to GH Pages
        git config user.name "Deploy Bot"
        git config user.email "action@github.com"
        mkdir -p ../dist
        cp -r site/* ../dist/
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: 05_DOCUMENTATION/mkdocs-site/dist

  notify:
    needs: deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Discord Notification
      if: always()
      uses: Ilshidur/action-discord@master
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      with:
        args: |
          {
            "embeds": [{
              "title": "🚀 Portfolio Deploy ${{ job.status }}",
              "description": "Repo: ${{ github.repository }} | SHA: ${{ github.sha }}",
              "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "color": ${{ job.status == 'success' && 65280 || 16711680 }},
              "fields": [
                {"name": "Branch", "value": "${{ github.ref_name }}", "inline": true},
                {"name": "Status", "value": "${{ job.status }}", "inline": true}
              ],
              "footer": {"text": "leadarchitect@yandex.ru"}
            }]
          }

