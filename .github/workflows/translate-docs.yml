name: AI Translate Docs (RU→EN) - Exclude website

on:
  schedule:
    - cron: '0 2 * * 1'  # Weekly Monday 2AM UTC
  workflow_dispatch:
  pull_request:
    paths:
      - '05_DOCUMENTATION/mkdocs-site/docs/**'

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install requests GitPython

    - name: Run translation from 05_DOCUMENTATION/docs to mkdocs-site/docs/en (exclude website)
      env:
        GIGACHAT_API_KEY: ${{ secrets.GIGACHAT_API_KEY }}
      run: |
        cd scripts
        python translate-docs.py --api-key "$GIGACHAT_API_KEY" --exclude-website

    - name: Check for changes
      id: changes
      run: |
        git add 05_DOCUMENTATION/mkdocs-site/docs/en/
        if git diff --staged --quiet; then
          echo "changed=false" >> $GITHUB_OUTPUT
        else
          echo "changed=true" >> $GITHUB_OUTPUT
        fi

    - name: Commit translations
      if: steps.changes.outputs.changed == 'true'
      run: |
        git config user.name "AI Translator Bot"
        git config user.email "action@github.com"
        git commit -m "🤖 AI Translate: Update English docs via GigaChat [skip ci]"
        git push

    - name: Create Pull Request
      if: steps.changes.outputs.changed == 'true'
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "🤖 AI Translate: RU→EN docs update"
        title: "🤖 AI Translation: Updated English documentation (excl website)"
        body: |
          Automated translation using GigaChat AI.
          
          Excluded: website/ folder
          leadarchitect@yandex.ru
        branch: ai-translate-docs-${{ github.run_number }}
        base: main
