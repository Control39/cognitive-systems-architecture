name: Deploy + Email Notify

on:
  push:
    branches: ["main"]

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Check broken links
      uses: lycheeverse/lychee-action@v1
      with:
        args: --verbose --no-progress 05_DOCUMENTATION/mkdocs-site/docs/ README.md index.html

  deploy:
    needs: check-links
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Build & Deploy MkDocs
      run: |
        pip install mkdocs-material mkdocs-mermaid2-plugin
        cd 05_DOCUMENTATION/mkdocs-site
        mkdocs build --strict
        mkdir -p dist
        cp -r site/* dist/
    - name: Deploy GH Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./05_DOCUMENTATION/mkdocs-site/dist

  notify-email:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Send Email Notification
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.yandex.ru
        server_port: 587
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "🚀 Portfolio Deploy ${{ needs.deploy.result || 'unknown' }} | ${{ github.repository }}"
        to: leadarchitect@yandex.ru
        from: leadarchitect@yandex.ru
        body: |
          Deploy status: ${{ needs.deploy.result }}
          Repo: ${{ github.repository }}
          Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Branch: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        secure: true

