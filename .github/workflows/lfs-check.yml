name: LFS Integrity Check

on:
  push:
    paths:
      - '**/*.[png,jpg,jpeg,gif,pdf,zip,bin,tar]'
  pull_request:
  workflow_dispatch:

jobs:
  check-lfs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # lfs: false default, no force LFS if none

      - name: Install Git LFS
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs
          git lfs install
        continue-on-error: true

      - name: Run LFS checks
        run: |
          if ! command -v git-lfs &> /dev/null; then echo "No LFS, skip"; exit 0; fi
          chmod +x scripts/check-lfs.sh || echo "No script, skip"
          ./scripts/check-lfs.sh all || echo "LFS warnings non-fatal"
        continue-on-error: true

      - name: LFS prune dry-run
        run: git lfs prune --dry-run || echo "Prune info"
        continue-on-error: true

