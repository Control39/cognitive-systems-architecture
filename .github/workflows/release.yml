name: Immutable Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: DCO Check
        run: |
          git log --pretty=format:%s%n%b | grep -q 'Signed-off-by:' || exit 1
          echo '✅ DCO sign-off enforced'

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Images
        run: |
          docker buildx build -t ghcr.io/${{ github.repository }}/it-compass:${{ github.ref_name }} ./02_MODULES/it-compass --push
          docker buildx build -t ghcr.io/${{ github.repository }}/cloud-reason:${{ github.ref_name }} ./02_MODULES/cloud-reason --push
          docker buildx build -t ghcr.io/${{ github.repository }}/ml-model-registry:${{ github.ref_name }} ./02_MODULES/ml-model-registry --push

      - name: Artifact Checksums
        run: |
          SHA_IT=$(docker save ghcr.io/${{ github.repository }}/it-compass:${{ github.ref_name }} | sha256sum)
          echo "$SHA_IT" > checksums.txt
          # Repeat for others
          echo 'SHA-256 checksums generated'

      - name: Release Notes
        run: |
          git log --oneline $(git describe --tags --abbrev=0)..HEAD > notes.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            checksums.txt
            notes.txt
            EXECUTIVE_SUMMARY.md
          generate_release_notes: true

