name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Python lint
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    - run: pip install ruff black mypy
    - run: ruff check .
    - run: black --check .
    - run: mypy 02_MODULES/ --install-types --non-interactive
    - name: Setup PowerShell
      uses: actions/setup-powershell@v4
      with:
        powershell-version: '7.x'
    - name: Install PSScriptAnalyzer & lint
      shell: pwsh
      run: |
        Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
        Invoke-ScriptAnalyzer -Path 02_MODULES/arch-compass-framework/src -Recurse -Severity Error

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [it-compass, cloud-reason, ml-model-registry]
        include:
          - module: arch-compass-framework
            test-cmd: pwsh
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    - name: Install deps & test
      run: |
        cd 02_MODULES/${{ matrix.module }}
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest-cov pytest-mock || pip install pytest
        if [ -d tests ]; then
          pytest tests/ --cov=./src --cov-report=xml --cov-report=html -v || pytest tests/ -v
        else
          echo "No tests dir, skipping"
        fi
    - name: PowerShell Pester
      if: matrix.module == 'arch-compass-framework'
      container: mcr.microsoft.com/powershell:latest
      shell: pwsh
      run: |
        cd 02_MODULES/arch-compass-framework
        if (Test-Path ./tests) { Invoke-Pester ./tests -Output Detailed } else { Write-Output 'No tests dir, skip' }

  docker-test:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Docker build & test
      run: |
        docker compose build
        docker compose up -d
        # Healthcheck retry
        wait_for_url() {
          local url=$1
          for i in {1..30}; do
            if curl -f -s "$url" >/dev/null 2>&1; then return 0; fi
            echo "Waiting for $url... ($i/30)"
            sleep 2
          done
          echo "Timeout $url"
          return 1
        }
        wait_for_url "http://localhost:8000/docs" || { echo "cloud-reason failed"; docker compose logs cloud-reason || true; }
        wait_for_url "http://localhost:8501" || echo "it-compass warning"
        wait_for_url "http://localhost:8001" || echo "ml warning"
        docker compose down

